# Mosquitto configuration — IoT IndustriTech
# Port 1883 : reseau Docker interne (anonyme)
# Port 8883 : TLS pour clients externes (auth obligatoire)
# Port 9001 : WebSocket pour la webapp (anonyme)

# ─────────────────────────────────────────
# Port 1883 — MQTT interne Docker
# ─────────────────────────────────────────
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

# ─────────────────────────────────────────
# Port 8883 — MQTT/TLS externe securise
# ─────────────────────────────────────────
listener 8883 0.0.0.0
protocol mqtt
cafile /mosquitto/config/ca.crt
certfile /mosquitto/config/mosquitto.crt
keyfile /mosquitto/config/mosquitto.key
require_certificate false
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ─────────────────────────────────────────
# Port 9001 — WebSocket (webapp)
# ─────────────────────────────────────────
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true

# ─────────────────────────────────────────
# Persistance et logs
# ─────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
