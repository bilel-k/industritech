version: '3.8'

# Charge les variables depuis .env (copiez .env.example → .env)
name: iot-monitoring

services:
  # ─────────────────────────────────────────
  # Broker MQTT – Mosquitto
  # ─────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT non sécurisé (tests)
      - "8883:8883"   # MQTT sécurisé (TLS)
      - "9001:9001"   # WebSocket
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot-network
    healthcheck:
      # Port 1883 est allow_anonymous true — pas besoin de credentials
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/version", "-C", "1", "-h", "localhost", "-p", "1883", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────
  # Traitement des flux – Node-RED
  # ─────────────────────────────────────────
  node-red:
    image: nodered/node-red:3.1
    container_name: iot-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - ./node-red/data:/data
      - ./node-red/flows:/data/flows
    environment:
      - TZ=Europe/Paris
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET:-iotsecret2026}
    networks:
      - iot-network
    depends_on:
      - mosquitto
      - influxdb

  # ─────────────────────────────────────────
  # Base de données temporelle – InfluxDB 2
  # ─────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: iot-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD:-admin123!}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-industritech}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-iot_data}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-mytoken123superlong}
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────
  # Dashboard – Grafana
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: iot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - iot-network
    depends_on:
      - influxdb

  # ─────────────────────────────────────────
  # Simulateur de capteurs Python
  # ─────────────────────────────────────────
  sensor-simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: iot-sensor-sim
    restart: unless-stopped
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_USER=${MQTT_USER_SENSOR:-sensor}
      - MQTT_PASS=${MQTT_PASS_SENSOR:-changeme_sensor_2026}
    networks:
      - iot-network
    depends_on:
      - mosquitto

  # ─────────────────────────────────────────
  # Dashboard Web – IndustriTech IoT Webapp
  # ─────────────────────────────────────────
  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: iot-webapp
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:-mytoken123superlong}
      - INFLUX_ORG=${INFLUXDB_ORG:-industritech}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-iot_data}
      - PORT=8080
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
    networks:
      - iot-network
    depends_on:
      - influxdb
      - mosquitto

networks:
  iot-network:
    driver: bridge
    name: iot-network
